<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a56a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Etiquetas Prime">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Etiquetas Prime Ondulados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#e8f0f8;min-height:100vh;padding:16px 12px}
  .wrap{max-width:540px;margin:0 auto}
  .header{background:#1a56a0;border-radius:12px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
  .logo-box{background:white;border-radius:7px;padding:4px 10px;font-weight:900;font-size:17px;color:#1a56a0;flex-shrink:0}
  .header h1{color:white;font-size:16px;font-weight:700}
  .header p{color:#a8c8f0;font-size:11px;margin-top:1px}
  .card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .step{font-weight:700;color:#1a56a0;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  input[type=file]{display:block;width:100%;padding:8px 0;font-size:13px;color:#444;cursor:pointer}
  select,input[type=number],input[type=text]{width:100%;padding:9px 11px;border-radius:6px;border:1.5px solid #c5d6ed;font-size:15px;color:#222;background:#f7faff;outline:none}
  select:focus,input:focus{border-color:#1a56a0}
  .busca-row{display:flex;gap:8px;margin-bottom:8px}
  .busca-row input{flex:1}
  .busca-row button{padding:9px 14px;border-radius:6px;border:none;background:#1a56a0;color:white;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  label.lbl{display:block;font-size:10px;color:#666;font-weight:700;margin-bottom:3px;text-transform:uppercase}
  input.big{font-size:21px;font-weight:700;text-align:center}
  .preview-box{background:#f0f6ff;border-radius:7px;padding:10px 12px;font-size:12px;line-height:1.8;margin-top:8px;display:none}
  .preview-box span{color:#666}
  .btn{width:100%;padding:14px;border-radius:10px;border:none;background:#1a56a0;color:white;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(26,86,160,.3);display:none;margin-bottom:8px}
  .btn:disabled{background:#7aabdc;cursor:default}
  .btn-sec{background:white;color:#1a56a0;box-shadow:none;border:2px solid #1a56a0}
  .msg{margin-top:8px;border-radius:7px;padding:9px 12px;font-size:13px;font-weight:600;display:none}
  .ok{background:#e8f5e9;color:#2e7d32}
  .err{background:#fdecea;color:#c62828}
  .footer{margin-top:14px;text-align:center;color:#999;font-size:11px;padding-bottom:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-box">PRIME</div>
    <div>
      <h1>Gerador de Etiquetas</h1>
      <p>Prime Ondulados · Santa Maria do Oeste</p>
    </div>
  </div>

  <div class="card">
    <div class="step">1 · Carregar programação (xlsx)</div>
    <input type="file" id="fileXlsx" accept=".xlsx,.xls">
    <div id="msgXlsx" style="margin-top:7px;font-size:12px;color:#2e7d32;display:none"></div>
  </div>

  <div class="card" id="cardAba" style="display:none">
    <div class="step">1b · Selecionar aba (data)</div>
    <select id="selAba"></select>
    <button onclick="carregarAba()" style="margin-top:8px;width:100%;padding:9px;border-radius:6px;border:none;background:#1a56a0;color:white;font-weight:700;font-size:14px;cursor:pointer">Carregar OFs desta aba</button>
  </div>

  <div class="card" id="cardOf" style="display:none">
    <div class="step">2 · Selecionar OF</div>
    <div class="busca-row">
      <input type="text" id="buscaOf" placeholder="Digite o nº da OF..." oninput="filtrarOf()" inputmode="numeric">
      <button onclick="limparBusca()">✕</button>
    </div>
    <select id="selOf" size="1"></select>
    <div class="preview-box" id="previewDados"></div>
  </div>

  <div class="card" id="cardPalete" style="display:none">
    <div class="step">3 · Dados do palete</div>
    <div class="grid2">
      <div>
        <label class="lbl">Nº do Palete</label>
        <input class="big" type="number" id="numPalete" min="1" value="1">
      </div>
      <div>
        <label class="lbl">Chapas no Palete</label>
        <input class="big" type="number" id="qtdePalete" min="1" placeholder="ex: 625">
      </div>
    </div>
  </div>

  <button class="btn" id="btnImprimir" onclick="gerarEImprimir()">🖨️ Imprimir Etiqueta</button>
  <button class="btn btn-sec" id="btnBaixar" onclick="gerarEBaixar()">⬇ Baixar PDF</button>
  <div id="msgResult" class="msg"></div>
  <div class="footer">Prime Ondulados · Gerador de Etiquetas de Palete</div>
</div>

const { jsPDF } = window.jspdf;
let ordens = [], workbook = null;

function numFmt(v) {
  if (v===null||v===undefined||v==='') return '';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return n.toFixed(3).replace('.', ',');
}
function findCol(headers, keys) {
  return headers.find(h => h && keys.some(k => h.toLowerCase().includes(k))) || '';
}
function detectarCabecalho(ws) {
  const range = XLSX.utils.decode_range(ws['!ref']||'A1:Z10');
  for (let r=range.s.r; r<=Math.min(range.e.r,5); r++) {
    const row=[];
    for (let c=range.s.c; c<=range.e.c; c++) {
      const cell=ws[XLSX.utils.encode_cell({r,c})];
      row.push(cell?String(cell.v||''):'');
    }
    if (row.some(h=>h.toUpperCase()==='OF')) return r;
  }
  return 0;
}
function processarAba(ws) {
  const hr=detectarCabecalho(ws);
  const range=XLSX.utils.decode_range(ws['!ref']||'A1');
  const nr=Object.assign({},range,{s:{r:hr,c:range.s.c}});
  const wsC=Object.assign({},ws,{'!ref':XLSX.utils.encode_range(nr)});
  const data=XLSX.utils.sheet_to_json(wsC,{defval:'',raw:true});
  if (!data.length) return [];
  const headers=Object.keys(data[0]);
  const colOf=findCol(headers,['of']);
  const colCli=findCol(headers,['cliente','client']);
  const colPap=findCol(headers,['p.o.','p.o','papelao','papelão','papel']);
  const colQtd=findCol(headers,['qtde pedido','quantidade pedido']);
  const colLarg=findCol(headers,['largura']);
  const colComp=findCol(headers,['comprimento']);
  const colRef=findCol(headers,['sliter','slitter','vincad','referencia','referência']);
  if (!colOf) return null;
  return data.filter(r=>r[colOf]&&!isNaN(parseFloat(r[colOf]))&&parseFloat(r[colOf])>100000).map(r=>{
    let medida='';
    if(colLarg&&colComp){const l=numFmt(r[colLarg]),c=numFmt(r[colComp]);if(l&&c)medida=l+' X '+c;}
    return {
      of:String(r[colOf]).trim().split('.')[0],
      cliente:colCli?String(r[colCli]).trim():'',
      papelao:colPap?String(r[colPap]).trim():'',
      qtdePedido:colQtd?String(r[colQtd]).trim():'',
      medida,
      referencia:colRef?String(r[colRef]).trim():'',
    };
  });
}

document.getElementById('fileXlsx').addEventListener('change', function(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try {
      workbook=XLSX.read(ev.target.result,{type:'array',cellDates:false});
      const abas=workbook.SheetNames;
      const sel=document.getElementById('selAba');
      sel.innerHTML='';
      abas.forEach(a=>{const o=document.createElement('option');o.value=o.textContent=a;sel.appendChild(o);});
      document.getElementById('cardAba').style.display='block';
      let ok=false;
      for(const aba of abas){const r=processarAba(workbook.Sheets[aba]);if(r&&r.length>0){sel.value=aba;popularOrdens(r,aba);ok=true;break;}}
      if(!ok){document.getElementById('msgXlsx').textContent='Selecione a aba abaixo.';document.getElementById('msgXlsx').style.display='block';}
    } catch(err){alert('Erro: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
});

function carregarAba(){
  const aba=document.getElementById('selAba').value;
  if(!workbook||!aba) return;
  const r=processarAba(workbook.Sheets[aba]);
  if(!r){alert('Coluna OF não encontrada.');return;}
  if(!r.length){alert('Nenhuma OF encontrada.');return;}
  popularOrdens(r,aba);
}

function popularOrdens(lista,aba){
  ordens=lista;
  preencherSelect(ordens);
  document.getElementById('msgXlsx').textContent='✓ '+ordens.length+' OF(s) — aba: '+aba;
  document.getElementById('msgXlsx').style.display='block';
  document.getElementById('cardOf').style.display='block';
  document.getElementById('cardPalete').style.display='block';
  document.getElementById('btnImprimir').style.display='block';
  document.getElementById('btnBaixar').style.display='block';
  atualizarPreview();
}

function preencherSelect(lista){
  const sel=document.getElementById('selOf');
  const valorAtual=sel.value;
  sel.innerHTML='';
  lista.forEach(o=>{const opt=document.createElement('option');opt.value=o.of;opt.textContent='OF '+o.of+(o.cliente?' · '+o.cliente:'');sel.appendChild(opt);});
  // tentar manter seleção
  if(valorAtual && lista.find(o=>o.of===valorAtual)) sel.value=valorAtual;
  atualizarPreview();
}

function filtrarOf(){
  const busca=document.getElementById('buscaOf').value.trim();
  if(!busca){preencherSelect(ordens);return;}
  const filtradas=ordens.filter(o=>o.of.includes(busca)||(o.cliente&&o.cliente.toLowerCase().includes(busca.toLowerCase())));
  preencherSelect(filtradas);
  // se só uma, selecionar automaticamente
  if(filtradas.length===1) document.getElementById('selOf').value=filtradas[0].of;
  atualizarPreview();
}

function limparBusca(){
  document.getElementById('buscaOf').value='';
  preencherSelect(ordens);
}

document.getElementById('selOf').addEventListener('change', atualizarPreview);
function atualizarPreview(){
  const of=document.getElementById('selOf').value;
  const o=ordens.find(x=>x.of===of); if(!o) return;
  let html='';
  if(o.cliente)    html+='<div><span>Cliente: </span><strong>'+esc(o.cliente)+'</strong></div>';
  if(o.papelao)    html+='<div><span>Papelão: </span><strong>'+esc(o.papelao)+'</strong></div>';
  if(o.qtdePedido) html+='<div><span>Qtde pedido: </span><strong>'+esc(o.qtdePedido)+' chapas</strong></div>';
  if(o.medida)     html+='<div><span>Medida: </span><strong>'+esc(o.medida)+'</strong></div>';
  if(o.referencia) html+='<div><span>Referência: </span><strong>'+esc(o.referencia)+'</strong></div>';
  const prev=document.getElementById('previewDados');
  prev.innerHTML=html; prev.style.display=html?'block':'none';
}

function gerarPDF(dados) {
  const doc = new jsPDF({unit:'mm', format:'a4', orientation:'portrait'});
  const PW=210, left=14, topoFita=40;
  const W=PW-28; // 182mm
  const HC=W/2;  // 91mm por coluna

  // Logo
  const logoW=W, logoH=logoW*0.364;
  doc.addImage('data:image/jpeg;base64,'+LOGO_B64,'JPEG',left,topoFita,logoW,logoH);
  let y = topoFita + logoH + 5;

  const BLUE=[14,114,188];

  // Seção CLIENTE (fundo azul)
  doc.setFillColor(...BLUE);
  doc.rect(left, y, W, 20, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('CLIENTE', left+3, y+5);
  // Nome do cliente com fonte adaptável
  let szCli=22;
  doc.setFontSize(szCli);
  while(doc.getTextWidth(dados.cliente) > W-6 && szCli > 11) { szCli--; doc.setFontSize(szCli); }
  doc.text(dados.cliente, left+3, y+16);
  y += 24;

  // Seção IDENTIFICAÇÃO DO PRODUTO (fundo azul)
  doc.setFillColor(...BLUE);
  doc.rect(left, y, W, 16, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('IDENTIFICAÇÃO DO PRODUTO', left+3, y+5);
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('PAPELÃO:  ' + (dados.papelao||''), left+3, y+13);
  y += 20;

  // Grade com bordas
  doc.setTextColor(0,0,0);
  doc.setDrawColor(0,0,0);
  doc.setLineWidth(0.4);

  function celula(x, cy, w, h, label, valor, szVal) {
    doc.rect(x, cy, w, h);
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text(label, x+2, cy+5);
    if(valor) {
      doc.setFont('helvetica','bold'); doc.setFontSize(szVal||15);
      doc.text(String(valor), x+2, cy+h-3);
    }
  }

  const hoje = new Date();
  const dataFab = hoje.toLocaleDateString('pt-BR');

  // Linha 1: OF | OC
  celula(left,    y, HC, 14, 'ORDEM DE FABRICAÇÃO (OF)', dados.of, 15);
  celula(left+HC, y, HC, 14, 'ORDEM DE COMPRA (OC)', dados.oc||'', 15);
  y += 14;

  // Linha 2: MEDIDAS | REFERÊNCIA
  celula(left,    y, HC, 14, 'MEDIDAS (LARGURA X COMPRIMENTO)', dados.medida, 14);
  celula(left+HC, y, HC, 14, 'REFERÊNCIA', dados.referencia, 14);
  y += 14;

  // Linha 3: DATA DE FABRICAÇÃO | QUANT. PEDIDO
  celula(left,    y, HC, 16, 'DATA DE FABRICAÇÃO', dataFab, 16);
  celula(left+HC, y, HC, 16, 'QUANT. PEDIDO', dados.qtdePedido, 16);
  y += 16;

  // Linha 4: PALETE Nº | Quant. PALETE
  celula(left,    y, HC, 22, 'PALETE Nº', dados.numPalete||'', 20);
  celula(left+HC, y, HC, 22, 'Quant. PALETE', dados.qtdePalete||'', 20);

  return doc;
}

function getDados(){
  const of=document.getElementById('selOf').value;
  const o=ordens.find(x=>x.of===of); if(!o) return null;
  const numRaw=document.getElementById('numPalete').value;
  const qtdePalete=document.getElementById('qtdePalete').value;
  const numPalete=numRaw?String(parseInt(numRaw)).padStart(2,'0'):'';
  return {...o, qtdePalete, numPalete, numRaw:parseInt(numRaw)||0};
}

function avancarPalete(numRaw){
  if(numRaw) document.getElementById('numPalete').value=numRaw+1;
  document.getElementById('qtdePalete').value='';
}

function gerarEImprimir(){
  const dados=getDados();
  if(!dados){mostrarMsg('Selecione uma OF antes de imprimir.',false);return;}
  const vazios=[];
  if(!dados.numPalete) vazios.push('Nº do Palete');
  if(!dados.qtdePalete) vazios.push('Quantidade de Chapas');
  if(vazios.length>0){
    const ok=confirm('⚠️ '+vazios.join(' e ')+' está'+(vazios.length>1?'o':'')+' em branco.\nDeseja imprimir somente com as informações do cliente?');
    if(!ok) return;
  }
  const doc=gerarPDF(dados);
  const fileName='etiqueta_OF'+dados.of+'_palete'+dados.numPalete+'.pdf';
  const blob=doc.output('blob');
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],fileName,{type:'application/pdf'})]})){
    const file=new File([blob],fileName,{type:'application/pdf'});
    navigator.share({files:[file],title:fileName})
      .then(()=>mostrarMsg('✓ OF '+dados.of+' · Palete '+dados.numPalete+' — compartilhado para impressão',true))
      .catch(()=>{});
  } else {
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    mostrarMsg('✓ OF '+dados.of+' · Palete '+dados.numPalete+' — PDF aberto, toque em Imprimir',true);
  }
  avancarPalete(dados.numRaw);
}

function gerarEBaixar(){
  const dados=getDados();
  if(!dados){mostrarMsg('Selecione uma OF antes de baixar.',false);return;}
  const vazios=[];
  if(!dados.numPalete) vazios.push('Nº do Palete');
  if(!dados.qtdePalete) vazios.push('Quantidade de Chapas');
  if(vazios.length>0){
    const ok=confirm('⚠️ '+vazios.join(' e ')+' está'+(vazios.length>1?'o':'')+' em branco.\nDeseja imprimir somente com as informações do cliente?');
    if(!ok) return;
  }
  const doc=gerarPDF(dados);
  doc.save('etiqueta_OF'+dados.of+'_palete'+dados.numPalete+'.pdf');
  mostrarMsg('✓ PDF baixado — OF '+dados.of+' · Palete '+dados.numPalete,true);
  avancarPalete(dados.numRaw);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mostrarMsg(txt,ok){const el=document.getElementById('msgResult');el.textContent=txt;el.className='msg '+(ok?'ok':'err');el.style.display='block';}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
